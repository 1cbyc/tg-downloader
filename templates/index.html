<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Video Downloader</title>
</head>
<body>
    <h1>Telegram Video Downloader</h1>
    <form action="/download" method="POST">
        <label for="target">Channel/Group Username or ID:</label>
        <input type="text" id="target" name="target" required>

        <label for="video_ids">Video IDs (comma-separated):</label>
        <input type="text" id="video_ids" name="video_ids" required>

        <button type="submit">Download Selected Videos</button>
    </form>
</body>
</html>
